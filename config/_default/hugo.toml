theme = "blowfish"
baseURL = "https://shonyuyang.github.io/pidea/"
defaultContentLanguage = "zh-tw"

enableRobotsTXT = true
summaryLength = 30
hasCJKLanguage = true
enableEmoji = true

[pagination]
  pagerSize = 10

[imaging]
  anchor = "Center"

[taxonomies]
  tag = "tags"
  category = "categories"
  series = "series"

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5

[outputs]
  home = ["HTML", "RSS", "JSON"]

[related]
  threshold = 0
  toLower = false

    [[related.indices]]
      name = "tags"
      weight = 100

    [[related.indices]]
      name = "categories"
      weight = 100

    [[related.indices]]
      name = "series"
      weight = 50

    [[related.indices]]
      name = "date"
      weight = 10

[markup.goldmark.renderer]
  unsafe = true
